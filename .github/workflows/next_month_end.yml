name: Fetch Medical Data (Until Next Month End)

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt update && sudo apt install -y jq html-xml-utils

      - name: Make script executable
        run: chmod +x run.sh

      - name: Calculate days until next month end (exclude today)
        id: calc_days
        run: |
          tomorrow=$(date -d "tomorrow" +%Y-%m-%d)
          next_month_end=$(date -d "$(date +%Y-%m-01) +1 month -1 day" +%Y-%m-%d)
          days=$(( ( $(date -d "$next_month_end" +%s) - $(date -d "$tomorrow" +%s) ) / 86400 + 1 ))
          echo "days=$days" >> $GITHUB_OUTPUT

      - name: Run script
        run: ./run.sh ${{ steps.calc_days.outputs.days }}

      # ★ output/ のみ差分検出
      - name: Detect diff
        id: diff
        run: |
          git add output/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --cached --name-only > changed_files.txt
          fi

      # ★ Discord 通知（output/ の変更のみ）
      - name: Notify Discord
        if: steps.diff.outputs.changed == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FILES=$(cat changed_files.txt | sed ':a;N;$!ba;s/\n/, /g')
          PAYLOAD=$(jq -n --arg content "更新がありました:\n$FILES" '{content: $content}')
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$WEBHOOK"

      # ★ output/ のみ commit/push
      - name: Commit & Push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/

          if git diff --cached --quiet; then
            echo "No changes in output/, skipping commit"
            exit 0
          fi

          git commit -m "Update output: $(date '+%Y-%m-%d %H:%M:%S')"
          git push

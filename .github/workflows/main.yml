name: Fetch Medical Data

on:
  schedule:
    - cron: "0 6 * * FRI"      # JST 15:00 毎週金曜
    - cron: "0 2 1 * *"        # JST 11:00 毎月1日
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt update && sudo apt install -y jq pup

      - name: Make script executable
        run: chmod +x run.sh

      # ★ 毎月1日なら days=30 を渡す（UTC で判定）
      - name: Set DAYS
        id: setdays
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            echo "days=30" >> $GITHUB_OUTPUT
          else
            echo "days=" >> $GITHUB_OUTPUT
          fi

      - name: Run script
        run: |
          if [ -z "${{ steps.setdays.outputs.days }}" ]; then
            ./run.sh
          else
            ./run.sh ${{ steps.setdays.outputs.days }}
          fi

      # ★ output/ のみ差分検出
      - name: Detect diff
        id: diff
        run: |
          git add output/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --cached --name-only > changed_files.txt
          fi

      # ★ Discord 通知（output/ の変更のみ）
      - name: Notify Discord
        if: steps.diff.outputs.changed == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FILES=$(cat changed_files.txt | sed ':a;N;$!ba;s/\n/, /g')
          PAYLOAD=$(jq -n --arg content "更新がありました:\n$FILES" '{content: $content}')
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$WEBHOOK"

      # ★ output/ のみ commit/push
      - name: Commit & Push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/

          if git diff --cached --quiet; then
            echo "No changes in output/, skipping commit"
            exit 0
          fi

          git commit -m "Update output: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
